<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1712"/>
      <stop offset="1" stop-color="#221a10"/>
    </linearGradient>
    <radialGradient id="glow5" cx="0.15" cy="0.2" r="0.6">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg5)"/>
  <rect width="600" height="340" fill="url(#glow5)"/>
  <circle cx="40" cy="34" r="6" fill="#ef4444" opacity="0.7"/>
