  <rect x="390" y="70" width="150" height="90" rx="12" fill="#0f0f16" stroke="#3a2c18"/>
  <text x="404" y="94" fill="#c8a876" font-family="Arial, sans-serif" font-size="10">Total catalog</text>
  <text x="404" y="122" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="bold">3,240</text>
  <text x="404" y="142" fill="#f59e0b" font-family="Arial, sans-serif" font-size="10">books available</text>

  <rect x="390" y="172" width="150" height="128" rx="12" fill="#0f0f16" stroke="#3a2c18"/>
  <text x="404" y="196" fill="#c8a876" font-family="Arial, sans-serif" font-size="10">Borrowed this month</text>
  <g transform="translate(404,210)">
