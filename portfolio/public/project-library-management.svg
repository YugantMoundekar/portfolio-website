    <rect x="54" y="4" width="20" height="56" fill="#f59e0b"/>
    <rect x="78" y="14" width="20" height="46" fill="#22c55e"/>
    <rect x="102" y="0" width="16" height="60" fill="#a855f7"/>
    <rect x="122" y="8" width="20" height="52" fill="#38bdf8"/>
    <rect x="146" y="18" width="18" height="42" fill="#ec4899" opacity="0.7"/>
    <rect x="0" y="90" width="300" height="8" rx="2" fill="#3a2c18"/>
    <rect x="10" y="30" width="18" height="60" fill="#22c55e" opacity="0.8"/>
    <rect x="32" y="20" width="20" height="70" fill="#f59e0b" opacity="0.8"/>
    <rect x="56" y="36" width="16" height="54" fill="#3b82f6" opacity="0.8"/>
    <rect x="76" y="24" width="20" height="66" fill="#a855f7" opacity="0.8"/>
