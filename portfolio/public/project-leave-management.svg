<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#181321"/>
      <stop offset="1" stop-color="#1e1428"/>
    </linearGradient>
    <radialGradient id="glow3" cx="0.85" cy="0.85" r="0.6">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg3)"/>
  <rect width="600" height="340" fill="url(#glow3)"/>
  <circle cx="40" cy="34" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="60" cy="34" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="80" cy="34" r="6" fill="#22c55e" opacity="0.7"/>
  <rect x="150" y="24" width="220" height="20" rx="10" fill="#ffffff" opacity="0.06"/>

  <!-- Calendar -->
  <g transform="translate(60,70)">
    <rect width="300" height="230" rx="12" fill="#ffffff" opacity="0.04"/>
    <text x="20" y="30" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="15" font-weight="bold">March 2026</text>
    <g font-family="Arial, sans-serif" font-size="10" fill="#7c7c92">
      <text x="28" y="52">Mon</text><text x="68" y="52">Tue</text><text x="108" y="52">Wed</text>
      <text x="150" y="52">Thu</text><text x="190" y="52">Fri</text><text x="228" y="52">Sat</text><text x="264" y="52">Sun</text>
    </g>
    <!-- grid of days -->
    <g>
      <!-- row1 -->
      <rect x="18" y="65" width="34" height="30" rx="6" fill="#26212f"/>
      <rect x="58" y="65" width="34" height="30" rx="6" fill="#26212f"/>
      <rect x="98" y="65" width="34" height="30" rx="6" fill="#26212f"/>
      <rect x="138" y="65" width="34" height="30" rx="6" fill="#a855f7"/>
      <rect x="178" y="65" width="34" height="30" rx="6" fill="#a855f7"/>
      <rect x="218" y="65" width="34" height="30" rx="6" fill="#26212f" opacity="0.5"/>
      <rect x="258" y="65" width="34" height="30" rx="6" fill="#26212f" opacity="0.5"/>
      <!-- row2 -->
      <rect x="18" y="103" width="34" height="30" rx="6" fill="#26212f"/>
      <rect x="58" y="103" width="34" height="30" rx="6" fill="#26212f"/>
      <rect x="98" y="103" width="34" height="30" rx="6" fill="#26212f"/>
      <rect x="138" y="103" width="34" height="30" rx="6" fill="#26212f"/>
      <rect x="178" y="103" width="34" height="30" rx="6" fill="#26212f"/>
      <rect x="218" y="103" width="34" height="30" rx="6" fill="#26212f" opacity="0.5"/>
      <rect x="258" y="103" width="34" height="30" rx="6" fill="#26212f" opacity="0.5"/>
      <!-- row3 -->
      <rect x="18" y="141" width="34" height="30" rx="6" fill="#26212f"/>
      <rect x="58" y="141" width="34" height="30" rx="6" fill="#ec4899" opacity="0.85"/>
      <rect x="98" y="141" width="34" height="30" rx="6" fill="#26212f"/>
      <rect x="138" y="141" width="34" height="30" rx="6" fill="#26212f"/>
      <rect x="178" y="141" width="34" height="30" rx="6" fill="#26212f"/>
      <rect x="218" y="141" width="34" height="30" rx="6" fill="#26212f" opacity="0.5"/>
      <rect x="258" y="141" width="34" height="30" rx="6" fill="#26212f" opacity="0.5"/>
    </g>
    <g font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">
      <circle cx="45" cy="205" r="5" fill="#a855f7"/>
      <text x="56" y="209">Approved leave</text>
      <circle cx="45" cy="222" r="5" fill="#ec4899"/>
      <text x="56" y="226">Pending approval</text>
    </g>
  </g>

  <rect x="390" y="70" width="150" height="90" rx="12" fill="#0f0f16" stroke="#2a2a35"/>
  <text x="404" y="94" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Leave balance</text>
  <text x="404" y="122" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="bold">14 days</text>
  <text x="404" y="142" fill="#a855f7" font-family="Arial, sans-serif" font-size="10">remaining this year</text>

  <rect x="390" y="172" width="150" height="128" rx="12" fill="#0f0f16" stroke="#2a2a35"/>
  <text x="404" y="196" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Requests</text>
  <path d="M404 210 l6 6 l10 -12" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="428" y="216" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="11">Approved</text>
  <circle cx="407" cy="240" r="5" fill="#f59e0b"/>
  <text x="428" y="244" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="11">Pending</text>
  <path d="M401 265 l12 12 M413 265 l-12 12" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <text x="428" y="273" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="11">Rejected</text>
</svg>
