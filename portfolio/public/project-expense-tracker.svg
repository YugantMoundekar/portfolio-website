<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1a16" />
      <stop offset="1" stop-color="#101c22" />
    </linearGradient>
    <radialGradient id="glow2" cx="0.15" cy="0.85" r="0.6">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg2)"/>
  <rect width="600" height="340" fill="url(#glow2)"/>
  <circle cx="40" cy="34" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="60" cy="34" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="80" cy="34" r="6" fill="#22c55e" opacity="0.7"/>
  <rect x="150" y="24" width="220" height="20" rx="10" fill="#ffffff" opacity="0.06"/>

  <!-- Donut chart -->
  <g transform="translate(150,175)">
    <circle r="72" fill="none" stroke="#1c2b26" stroke-width="26"/>
    <circle r="72" fill="none" stroke="#22c55e" stroke-width="26" stroke-dasharray="180 271" stroke-dashoffset="0" transform="rotate(-90)"/>
    <circle r="72" fill="none" stroke="#3b82f6" stroke-width="26" stroke-dasharray="90 271" stroke-dashoffset="-180" transform="rotate(-90)"/>
    <circle r="72" fill="none" stroke="#f59e0b" stroke-width="26" stroke-dasharray="60 271" stroke-dashoffset="-270" transform="rotate(-90)"/>
    <text x="0" y="-4" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">₹42,150</text>
    <text x="0" y="16" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">This month</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="11">
    <circle cx="290" cy="120" r="5" fill="#22c55e"/>
    <text x="302" y="124" fill="#cbd5e1">Food &amp; Dining — 45%</text>
    <circle cx="290" cy="145" r="5" fill="#3b82f6"/>
    <text x="302" y="149" fill="#cbd5e1">Travel — 30%</text>
    <circle cx="290" cy="170" r="5" fill="#f59e0b"/>
    <text x="302" y="174" fill="#cbd5e1">Bills &amp; Utilities — 25%</text>
  </g>

  <!-- Bar chart -->
  <g transform="translate(290,205)">
    <rect x="0" y="40" width="18" height="50" rx="3" fill="#22c55e" opacity="0.85"/>
    <rect x="26" y="20" width="18" height="70" rx="3" fill="#22c55e" opacity="0.6"/>
    <rect x="52" y="55" width="18" height="35" rx="3" fill="#22c55e" opacity="0.4"/>
    <rect x="78" y="10" width="18" height="80" rx="3" fill="#22c55e"/>
    <rect x="104" y="45" width="18" height="45" rx="3" fill="#22c55e" opacity="0.5"/>
    <rect x="130" y="30" width="18" height="60" rx="3" fill="#22c55e" opacity="0.7"/>
    <rect x="156" y="60" width="18" height="30" rx="3" fill="#22c55e" opacity="0.35"/>
  </g>
  <text x="290" y="310" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Weekly spend trend</text>
</svg>
